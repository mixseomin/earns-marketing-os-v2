name: Deploy MOS v2

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'wiki/**'
      - 'decisions/**'
      - '.gitignore'
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  # Serialize deploys: QUEUE a new push behind the running one instead of cancelling
  # it. Cancelling a deploy mid `next build` corrupts .next on the shared server dir
  # → `next start` exits 1 → 502 (incident 2026-06-17, two sessions pushing at once).
  # Also: deploy.sh now does atomic swap (.next ↔ .next.bak) so build failure
  # rolls back to last-known-good (incident 2026-06-28: build SIGKILL left
  # .next/server/ writing new CSS hashes but .next/static/css/ wiped, server
  # kept serving HTML that 400'd on every <link>).
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, mos2]
    steps:
      - name: Deploy
        run: sudo /opt/earns-marketing-os-v2/deploy.sh
