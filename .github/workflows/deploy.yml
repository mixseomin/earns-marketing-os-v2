name: Deploy MOS v2

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'wiki/**'
      - 'decisions/**'
      - '.gitignore'
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  # Push 3 commits rapid → only deploy the last; skip intermediate runs.
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, mos2]
    steps:
      - name: Deploy
        run: sudo /opt/earns-marketing-os-v2/deploy.sh
